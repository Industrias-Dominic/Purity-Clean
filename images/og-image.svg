<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3fbff"/>
      <stop offset="100%" style="stop-color:#e9f8f4"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b7189"/>
      <stop offset="100%" style="stop-color:#14a9ca"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0b7189" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <circle cx="1080" cy="90" r="200" fill="#16a34a" opacity="0.08"/>
  <circle cx="150" cy="580" r="180" fill="#0b7189" opacity="0.1"/>

  <g filter="url(#shadow)">
    <circle cx="200" cy="315" r="100" fill="url(#brandGrad)"/>
  </g>
  <text x="200" y="328" font-family="Raleway, sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2">P&amp;C</text>

  <text x="380" y="250" font-family="Raleway, sans-serif" font-size="72" font-weight="800" fill="#103746" letter-spacing="-1">Purity &amp; Clean</text>

  <text x="380" y="310" font-family="Manrope, sans-serif" font-size="28" font-weight="500" fill="#4f6c79">Soluciones de limpieza profesional</text>

  <line x1="380" y1="345" x2="700" y2="345" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>

  <g font-family="Manrope, sans-serif" font-size="22" fill="#103746">
    <text x="380" y="390">
      <tspan fill="#0b7189" font-weight="700">✓</tspan>
      <tspan dx="8">Limpieza profunda de sofás</tspan>
    </text>
    <text x="380" y="425">
      <tspan fill="#0b7189" font-weight="700">✓</tspan>
      <tspan dx="8">Sanitización de colchones</tspan>
    </text>
    <text x="380" y="460">
      <tspan fill="#0b7189" font-weight="700">✓</tspan>
      <tspan dx="8">Alfombras y sillas ergonómicas</tspan>
    </text>
    <text x="380" y="495">
      <tspan fill="#0b7189" font-weight="700">✓</tspan>
      <tspan dx="8">Productos de mantenimiento</tspan>
    </text>
  </g>

  <rect x="850" y="360" width="240" height="180" rx="16" fill="white" opacity="0.7"/>
  <text x="970" y="410" font-family="Manrope, sans-serif" font-size="20" font-weight="700" fill="#103746" text-anchor="middle">+127</text>
  <text x="970" y="440" font-family="Manrope, sans-serif" font-size="18" fill="#4f6c79" text-anchor="middle">clientes</text>
  <text x="970" y="480" font-family="Manrope, sans-serif" font-size="20" font-weight="700" fill="#103746" text-anchor="middle">4.8</text>
  <text x="970" y="510" font-family="Manrope, sans-serif" font-size="18" fill="#4f6c79" text-anchor="middle">estrellas ★</text>

  <text x="600" y="600" font-family="Manrope, sans-serif" font-size="20" fill="#4f6c79" text-anchor="middle">Bogotá, Colombia · purityclean.com</text>
