<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b7189">
  <title>Sin conexión - Purity & Clean</title>
  <style>
    :root {
      --color-primary: #0b7189;
      --color-secondary: #14a9ca;
      --color-text: #1a1a2e;
      --color-bg: #f8fafc;
      --font-heading: 'Raleway', sans-serif;
      --font-body: 'Manrope', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, var(--color-bg) 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: var(--color-text);
    }

    .offline-container {
      text-align: center;
      max-width: 400px;
    }

    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(11, 113, 137, 0.3);
    }

    .offline-icon svg {
      width: 60px;
      height: 60px;
      fill: white;
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 1rem;
      color: var(--color-primary);
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      color: #64748b;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(11, 113, 137, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(11, 113, 137, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-text: #f1f5f9;
        --color-bg: #0f172a;
      }

      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      }

      p {
        color: #94a3b8;
      }
    }
  </style>
</head>
<body>
  <main class="offline-container">
    <div class="offline-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="none" stroke="white" stroke-width="2"/>
        <path d="M1 1l22 22" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Sin conexión</h1>
    <p>No se pudo conectar al servidor. Verifica tu conexión a internet e intenta de nuevo.</p>
    <a href="/" class="btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Volver al inicio
    </a>
  </main>
</body>
</html>
